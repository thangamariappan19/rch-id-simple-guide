<div class="landing-container page-container">
    <div class="content-wrapper">
        <div class="hero-banner">
            <img src="logobanner.webp" alt="TN Health Official Banner" class="official-banner-img">
        </div>

        <div class="official-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
            </svg>
            <span>Official Information Guide</span>
        </div>
        <h1 class="title">{{ content.title }}</h1>
        <p class="subtitle">{{ content.subtitle }}</p>
    </div>

    <div class="footer-action">
        <div class="footer-inner">
            <app-primary-button route="/rch-info" [label]="content.button"></app-primary-button>
        </div>
    </div>
</div>
